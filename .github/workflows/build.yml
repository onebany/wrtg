name: Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Verify version
        run: test "$(cat VERSION)" = "$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "wrtg") | .version')"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy -p wrtg --all-targets -- -D warnings

      - name: Run tests
        run: cargo test -p wrtg

      - name: Check shell scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck -x -e SC1091,SC2029,SC3043 install.sh bootstrap.sh uninstall.sh build-rust.sh openwrt/*.sh openwrt/wrtg.init openwrt/luci-app-wrtg/install-luci.sh

      - name: Check CF Worker
        run: |
          node --check openwrt/cf-worker.js
          sh openwrt/check-cidr-sync.sh

  build:
    name: build ${{ matrix.out }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-musl
            out: wrtg-linux-amd64
          - arch: arm64
            target: aarch64-unknown-linux-musl
            out: wrtg-linux-arm64
          - arch: arm
            target: armv7-unknown-linux-musleabihf
            out: wrtg-linux-arm

    steps:
      - uses: actions/checkout@v7

      - name: Set version
        run: echo "VERSION=$(cat VERSION)" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build static binary (musl)
        run: |
          mkdir -p dist
          cargo zigbuild --release -p wrtg --target ${{ matrix.target }}
          cp "target/${{ matrix.target }}/release/wrtg" "dist/${{ matrix.out }}"
          chmod +x "dist/${{ matrix.out }}"
          file "dist/${{ matrix.out }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.out }}
          path: dist/${{ matrix.out }}
          retention-days: 14
