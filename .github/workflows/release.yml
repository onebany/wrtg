name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Verify source
        run: |
          test "$(cat VERSION)" = "$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "wrtg") | .version')"
          cargo fmt --all -- --check
          cargo clippy -p wrtg --all-targets -- -D warnings
          cargo test -p wrtg

      - name: Check shell scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck -x -e SC1091,SC2029,SC3043 install.sh bootstrap.sh uninstall.sh build-rust.sh openwrt/*.sh openwrt/wrtg.init openwrt/luci-app-wrtg/install-luci.sh

      - name: Check CF Worker
        run: |
          node --check openwrt/cf-worker.js
          sh openwrt/check-cidr-sync.sh

  build:
    name: build ${{ matrix.out }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-musl
            out: wrtg-linux-amd64
          - arch: arm64
            target: aarch64-unknown-linux-musl
            out: wrtg-linux-arm64
          - arch: arm
            target: armv7-unknown-linux-musleabihf
            out: wrtg-linux-arm

    steps:
      - uses: actions/checkout@v4

      - name: Check VERSION matches tag
        run: |
          TAG_VER="${GITHUB_REF#refs/tags/v}"
          FILE_VER="$(cat VERSION)"
          if [ "$TAG_VER" != "$FILE_VER" ]; then
            echo "VERSION file ($FILE_VER) does not match tag ($TAG_VER)" >&2
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build static binary (musl)
        run: |
          mkdir -p dist
          cargo zigbuild --release -p wrtg --target ${{ matrix.target }}
          cp "target/${{ matrix.target }}/release/wrtg" "dist/${{ matrix.out }}"
          chmod +x "dist/${{ matrix.out }}"
          file "dist/${{ matrix.out }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: dist/${{ matrix.out }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    env:
      # Optional: set this repo secret to also publish to the Gitea host that the
      # default bootstrap.sh install path targets. Absent → the Gitea step is
      # skipped and only the GitHub release is created (previous behaviour).
      GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build OpenWrt install bundle
        run: |
          # Self-contained bundle: prebuilt binaries + service files + LuCI + docs
          # + install.sh, so the router can install with no git/Rust (SKIP_BUILD=1).
          mkdir -p bundle/wrtg/dist
          cp -r install.sh bootstrap.sh build-rust.sh VERSION README.md openwrt bundle/wrtg/
          cp dist/wrtg-linux-amd64 dist/wrtg-linux-arm64 dist/wrtg-linux-arm bundle/wrtg/dist/
          tar -czf dist/wrtg-openwrt.tar.gz -C bundle wrtg

      - name: Generate checksums
        run: |
          cd dist
          sha256sum wrtg-linux-* wrtg-openwrt.tar.gz > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/wrtg-linux-amd64
            dist/wrtg-linux-arm64
            dist/wrtg-linux-arm
            dist/wrtg-openwrt.tar.gz
            bootstrap.sh
            dist/SHA256SUMS

      # Mirror the release to the Gitea host (the default install target in
      # bootstrap.sh / README). Runs only when GITEA_TOKEN is configured, so it
      # never affects the GitHub-only flow. Override the host via GITEA_API.
      - name: Publish to Gitea
        if: ${{ env.GITEA_TOKEN != '' }}
        env:
          GITEA_API: ${{ vars.GITEA_API || 'https://github.com/api/v1/repos/bany/wrtg' }}
        run: |
          set -eu
          TAG="${GITHUB_REF#refs/tags/}"
          auth="Authorization: token $GITEA_TOKEN"
          # Reuse the release for this tag if it already exists, else create it.
          rid="$(curl -fsSL -H "$auth" "$GITEA_API/releases/tags/$TAG" 2>/dev/null | jq -r '.id // empty' || true)"
          if [ -z "$rid" ]; then
            rid="$(curl -fsSL -X POST -H "$auth" -H 'Content-Type: application/json' \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\"}" \
              "$GITEA_API/releases" | jq -r '.id')"
          fi
          for f in dist/wrtg-linux-amd64 dist/wrtg-linux-arm64 dist/wrtg-linux-arm \
                   dist/wrtg-openwrt.tar.gz dist/SHA256SUMS bootstrap.sh; do
            name="$(basename "$f")"
            curl -fsSL -X POST -H "$auth" \
              -F "attachment=@$f;filename=$name" \
              "$GITEA_API/releases/$rid/assets?name=$name" >/dev/null
            echo "uploaded $name to Gitea release $TAG"
          done
